<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gửi Nhọc Nham</title>
    <style>
        body {
            background-color: #121212;
            color: #ff66b2;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
            font-size: 16px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 90vh;
        }
        #screen {
            width: 45%;
        }
        #right-side {
            width: 45%; 
            opacity: 0; 
            transition: opacity 4s ease-in; 
        
            /* Chuyển sang dùng Grid để tạo lưới */
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Tạo 3 cột bằng nhau */
            grid-template-rows: repeat(3, 1fr);    /* Tạo 3 hàng bằng nhau */
            gap: 15px; /* Khoảng cách giữa các bức ảnh */
            aspect-ratio: 1 / 1; /* Ép cả khối lưới này thành hình vuông */
    }

        #right-side img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Tự động cắt ảnh lấp đầy ô vuông mà không làm méo hình */
            border-radius: 10px; /* Bo tròn góc từng ảnh nhỏ */
            box-shadow: 0 0 15px rgba(255, 102, 178, 0.5); /* Tạo vầng sáng hồng mờ cho từng ảnh */
            transition: transform 0.3s; /* Tạo hiệu ứng chuyển động mượt khi di chuột */
    }

        /* Hiệu ứng phụ: Khi di chuột vào ảnh nào, ảnh đó sẽ phóng to lên một chút */
        #right-side img:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 0 25px #ff66b2;
    }
    </style>
</head>
<body>
    <pre id="screen"></pre> 
    
    <div id="right-side">
        <img src="y1.jpg" alt="Ảnh 1">
        <img src="y5.jpg" alt="Ảnh 2">
        <img src="y4.jpg" alt="Ảnh 3">
        <img src="y2.jpg" alt="Ảnh 4">
        <img src="muse.jpg" alt="Ảnh 5">
        <img src="y3.jpg" alt="Ảnh 6">
        <img src="y7.jpg" alt="Ảnh 7">
        <img src="y8.jpg" alt="Ảnh 8">
        <img src="y7.jpg" alt="Ảnh 9">
    </div>

    <script>
        const screen = document.getElementById("screen");
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        async function typeText(text, delay = 50) {
            for (let i = 0; i < text.length; i++) {
                screen.innerHTML += text.charAt(i);
                await sleep(delay);
            }
        }
        async function main() {
            await typeText("Khoi dong he thong...\n");
            await typeText("Dang kiem tra du lieu...\n");
            await typeText("Dang tim kiem nguoi dac biet...\n\n");
            await sleep(1000);

            await typeText("Ket qua tim kiem:\nTen: Ngoc Lam\nTrang thai: Rat dac biet\nMuc do quan trong: 1000000/10\n\n");
            
            await typeText("Dang phan tich trai tim...\n");
            await sleep(2000);
            await typeText("\nKet qua:\nKhong the xoa Ngoc Lam khoi bo nho.\nNgoc Lam sieu de thuong sieu dang yeu.\nTinh cam hien tai: Cuc ky nghiem tuc.\n\n");
            await typeText("THONG BAO QUAN TRONG\n----------------------------------\nMinh rat yeu Ngoc Lam.\nCam on vi da xuat hien trong cuoc song cua minh.\nMong rang moi ngay cua Ngoc Lam deu tran ngap niem vui.\nVa du chuyen gi xay ra, Ngoc Lam van luon la nguoi dac biet.\n----------------------------------\n");
            await typeText("Yeuuuuuuuuuuuuu emmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmm\nmoah moah moah moah\n\n");
            await typeText("Dang ve trai tim...\n\n");
            for (let y = 1.5; y > -1.5; y -= 0.1) {
                let line = "";
                for (let x = -1.5; x < 1.5; x += 0.05) {
                    let a = x * x + y * y - 1;
                    if ((a * a * a - x * x * y * y * y) <= 0.0) {
                        line += "*";
                    } else {
                        line += " ";
                    }
                }
                screen.innerHTML += line + "\n";
                await sleep(50);
            }
            document.getElementById("right-side").style.opacity = "1";
        }
        main();
    </script>
</body>
</html>
